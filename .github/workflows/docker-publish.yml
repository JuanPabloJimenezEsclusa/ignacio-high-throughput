name: Docker Publish

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  REGISTRY: ghcr.io
  IMPERATIVE_THROUGHPUT: imperative-throughput:1.0.0
  REACTIVE_THROUGHPUT: reactive-throughput:1.0.0
  SPRING_PROFILES_ACTIVE: native

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: maven
      - name: Set up Docker Buildx
        # git ls-remote --tags https://github.com/docker/setup-buildx-action.git
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Log into registry ${{ env.REGISTRY }}
        # git ls-remote --tags https://github.com/docker/login-action.git
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build images
        run: |          
          mvn -B -P"${SPRING_PROFILES_ACTIVE}" \
          spring-boot:build-image \
          -Dmaven.test.skip=true \
          -Dmaven.build.cache.enabled=false \
          --projects imperative-throughput,reactive-throughput
      - name: Transform lowercase - github.repository_owner
        run: |
          echo "REPOSITORY_OWNER=`echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]'`" >>${GITHUB_ENV}
      - name: Tag images
        run: |
          docker tag ${{ env.IMPERATIVE_THROUGHPUT }} ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER }}/${{ env.IMPERATIVE_THROUGHPUT }}
          docker tag ${{ env.REACTIVE_THROUGHPUT }} ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER }}/${{ env.REACTIVE_THROUGHPUT }}
      - name: Smoke Tests
        run: |
          docker images
      - name: Push image to GitHub Packages
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER }}/${{ env.IMPERATIVE_THROUGHPUT }}
          docker push ${{ env.REGISTRY }}/${{ env.REPOSITORY_OWNER }}/${{ env.REACTIVE_THROUGHPUT }}
