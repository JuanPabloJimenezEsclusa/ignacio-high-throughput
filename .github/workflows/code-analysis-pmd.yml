name: Code Analysis PMD

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: '35 2 * * 0'

permissions:
  contents: read

concurrency:
  group: code-analysis-pmd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pmd-code-scan:
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [ imperative-throughput, reactive-throughput ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Set up JDK 24
        uses: actions/setup-java@v5
        with:
          java-version: '24'
          distribution: 'zulu'
          cache: maven
      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@d9c1f3c5940cbf5923f1354e83fa858b4496ebaa
        with:
          rulesets: 'rulesets/java/quickstart.xml'
          sourcePath: '${{ matrix.module }}/src/main/java'
          analyzeModifiedFilesOnly: false
          uploadSarifReport: false
      - name: Rename SARIF file
        run: mv pmd-report.sarif pmd-report-${{ matrix.module }}.sarif
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pmd-report-${{ matrix.module }}.sarif
          category: ${{ matrix.module }}
