info:
  name: reactive-throughput-metrics
  type: http
  seq: 2

http:
  method: GET
  url: "{{reactive_url}}/reactive-throughput/actuator/metrics/:metric"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
    - name: Cache-Control
      value: no-cache
  params:
    - name: metric
      value: http.request.duration
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

