<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

<match **>
  @id elasticsearch
  @type elasticsearch
  @log_level debug

  index_name fluentd
  type_name fluentd
  include_tag_key true
  host elasticsearch
  port 9200
  scheme http

  logstash_format true
  reload_connections false
  reconnect_on_error true
  reload_on_failure true
  suppress_type_name true

  custom_headers { "Accept": "application/vnd.elasticsearch+x-ndjson; compatible-with=9" }
</match>
