<source>
  @type forward
  port 24224
  bind 0.0.0.0
  chunk_limit_size 4MB
</source>

<match **>
  @id elasticsearch
  @type elasticsearch
  @log_level debug

  # Connection
  scheme http
  host elasticsearch
  port 9200

  # Index configuration
  index_name fluentd
  logstash_format true
  logstash_prefix fluentd
  include_tag_key true
  tag_key tag
  time_key @timestamp

  # Connection settings
  request_timeout 30s
  reload_connections false
  reconnect_on_error true
  reload_on_failure true

  # ES9 compatibility
  custom_headers { "Accept": "application/vnd.elasticsearch+x-ndjson; compatible-with=9" }
</match>
