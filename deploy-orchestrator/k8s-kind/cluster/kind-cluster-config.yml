kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: kind-cluster
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry]
      config_path = "/etc/containerd/certs.d"
kubeadmConfigPatchesJSON6902:
  - group: kubeadm.k8s.io
    version: v1beta3
    kind: ClusterConfiguration
    patch: |
     - op: add
       path: /apiServer/certSANs/-
       value: my-hostname
nodes:
  - role: control-plane
    extraMounts:
      - hostPath: /tmp/shared
        containerPath: /tmp/shared
      - hostPath: /tmp/kind/_default
        containerPath: /etc/containerd/certs.d/_default
    extraPortMappings:
      # Expose prometheus metrics
      - containerPort: 30000
        hostPort: 30000
      # Expose grafana
      - containerPort: 31000
        hostPort: 31000
      # Expose imperative rest api
      - containerPort: 30088
        hostPort: 8888
      # Expose reactive rest api
      - containerPort: 30099
        hostPort: 9999
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    labels:
      tier: control-plane
      node: control-plane
  - role: worker
    extraMounts:
      - hostPath: /tmp/hostpath-provisioner
        containerPath: /tmp/hostpath-provisioner
      - hostPath: /tmp/shared
        containerPath: /tmp/shared
      - hostPath: /tmp/kind/_default
        containerPath: /etc/containerd/certs.d/_default
    labels:
      tier: utils
      node: worker1
  - role: worker
    extraMounts:
      - hostPath: /tmp/hostpath-provisioner
        containerPath: /tmp/hostpath-provisioner
      - hostPath: /tmp/shared
        containerPath: /tmp/shared
      - hostPath: /tmp/kind/_default
        containerPath: /etc/containerd/certs.d/_default
    labels:
      tier: backend
      node: worker2
  - role: worker
    extraMounts:
      - hostPath: /tmp/hostpath-provisioner
        containerPath: /tmp/hostpath-provisioner
      - hostPath: /tmp/shared
        containerPath: /tmp/shared
      - hostPath: /tmp/kind/_default
        containerPath: /etc/containerd/certs.d/_default
    labels:
      tier: backend
      node: worker3
